<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta
      name="description"
      content="A social-style profile and photo sharing web page with interactive modals."
    />
    <meta name="author" content="Brenda Jones" />
    <meta
      name="keywords"
      content="HTML, CSS, JavaScript, social app, profile page, cards UI"
    />
    <link href="./pages/index.css" rel="stylesheet" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <title>Spots</title>
  </head>
  <body class="page">
    <header class="header">
      <img class="header__logo" src="./images/logo.svg" alt="Spot logo" />
    </header>
    <main class="content">
      <section class="profile page__section">
        <img
          src="./images/spots-images/avatar.jpg"
          alt="Bessie Coleman"
          class="profile__avatar"
        />
        <div class="profile__column">
          <h1 class="profile__name">Bessie Coleman</h1>
          <p class="profile__description">Civil Aviator</p>
          <button class="profile__edit-btn" type="button">
            <img src="./images/Pencil.svg" alt="Pencil icon" />Edit profile
          </button>
        </div>
        <button class="profile__add-btn" type="button">
          <img src="./images/plus.svg" alt="Plus icon" /> New Post
        </button>
      </section>
      <section class="cards page__section">
        <ul class="cards__list">
          <li class="card">
            <img
              class="card__image"
              src="./images/spots-images/1-photo-by-moritz-feldmann-from-pexels.jpg"
              alt="Val Thorens"
            />
            <div class="card__content">
              <h2 class="card__title">Val Thorens</h2>
              <button type="button" class="card__like-btn"></button>
            </div>
          </li>
          <li class="card">
            <img
              src="./images/spots-images/2-photo-by-ceiline-from-pexels.jpg"
              alt="Restaurant terrace"
              class="card__image"
            />
            <div class="card__content">
              <h2 class="card__title">Restaurant terrace</h2>
              <button type="button" class="card__like-btn"></button>
            </div>
          </li>
          <li class="card">
            <img
              src="./images/spots-images/3-photo-by-tubanur-dogan-from-pexels.jpg"
              alt="Outdoor cafe"
              class="card__image"
            />
            <div class="card__content">
              <h2 class="card__title">An outdoor cafe</h2>
              <button type="button" class="card__like-btn"></button>
            </div>
          </li>
          <li class="card">
            <img
              src="./images/spots-images/4-photo-by-maurice-laschet-from-pexels.jpg"
              alt="long bridge"
              class="card__image"
            />
            <div class="card__content">
              <h2 class="card__title">
                A very long bridge, over the forest...
              </h2>
              <button type="button" class="card__like-btn"></button>
            </div>
          </li>
          <li class="card">
            <img
              src="./images/spots-images/5-photo-by-van-anh-nguyen-from-pexels.jpg"
              alt="Tunnel with light"
              class="card__image"
            />
            <div class="card__content">
              <h2 class="card__title">Tunnel with morning light</h2>
              <button type="button" class="card__like-btn"></button>
            </div>
          </li>
          <li class="card">
            <img
              src="./images/spots-images/6-photo-by-moritz-feldmann-from-pexels.jpg"
              alt="Mountain house"
              class="card__image"
            />
            <div class="card__content">
              <h2 class="card__title">Mountain house</h2>
              <button type="button" class="card__like-btn"></button>
            </div>
          </li>
        </ul>
      </section>
    </main>
    <footer class="footer page__section">
      <p class="footer__copyright">2026 &copy; Spots</p>
    </footer>
    <div class="modal" id="edit-profile-modal">
      <div class="modal__container">
        <button type="button" class="modal__close-btn"></button>
        <h2 class="modal__title">Edit profile</h2>
        <form class="modal__form">
          <label for="profile-name-input" class="modal__label">
            Name
            <input
              id="profile-name-input"
              type="text"
              class="modal__input"
              placeholder="Type your name"
            />
          </label>
          <label for="profile-description-input" class="modal__label"
            >Description
            <input
              id="profile-description-input"
              type="text"
              class="modal__input"
              placeholder="Describe yourself"
            />
          </label>
          <button type="submit" class="modal__submit-btn">Save</button>
        </form>
      </div>
    </div>
    <div class="modal" id="new-post-modal">
      <div class="modal__container">
        <button type="button" class="modal__close-btn"></button>
        <h2 class="modal__title">New post</h2>
        <form class="modal__form">
          <label for="card-image-input" class="modal__label">
            Image link
            <input
              id="card-image-input"
              type="url"
              class="modal__input"
              placeholder="Place a link to the picture"
            />
          </label>
          <label for="card-name-input" class="modal__label">
            Caption
            <input
              id="card-name-input"
              type="text"
              class="modal__input"
              placeholder="Type your caption"
            />
          </label>
          <button type="submit" class="modal__submit-btn">Save</button>
        </form>
      </div>
    </div>
    <script src="./scripts/index.js"></script>
  </body>
</html>
